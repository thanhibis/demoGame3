<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<title></title>
		<meta name="description" content="">
		<meta name="keywords" content="">
		<meta name="format-detection" content="telephone=no">
		<!--	<link rel="shortcut icon" href="./favicon.ico" >-->
		<link type="text/css" rel="stylesheet" href="./js/slick/slick-theme.css">
		<link type="text/css" rel="stylesheet" href="./js/slick/slick.css">
		<link type="text/css" rel="stylesheet" href="./css/styles.css">
	</head>
	<body>
		<header id="header">
			<a href="./" class="header-logo">
				<img src="./img/logo.png" alt="Jx2Reborn">
			</a>
			<nav class="header-nav">
				<div class="header-nav__logo sp">
					<img src="./img/logo.png" alt="Jx2Reborn">
				</div>
				<ul class="header-nav__menu">
					<li class="header-nav__menu-item">
						<a href="" class="c-btn__img">
							<img src="./img/menu-01.png" alt="HOME" class="img-01">
							<img src="./img/menu-01-hv.png" alt="HOME" class="img-02">
						</a>
					</li>
					<li class="header-nav__menu-item">
						<a href="" class="c-btn__img">
							<img src="./img/menu-02.png" alt="Highlight" class="img-01">
							<img src="./img/menu-02-hv.png" alt="Highlight" class="img-02">
						</a>
					</li>
					<li class="header-nav__menu-item">
						<a href="" class="c-btn__img">
							<img src="./img/menu-03.png" alt="Community" class="img-01">
							<img src="./img/menu-03-hv.png" alt="Community" class="img-02">
						</a>
					</li>
					<li class="header-nav__menu-item">
						<a href="" class="c-btn__img">
							<img src="./img/menu-04.png" alt="Group" class="img-01">
							<img src="./img/menu-04-hv.png" alt="Group" class="img-02">
						</a>
					</li>
				</ul>
			</nav>
			<span class="js-mobile">
				<span></span>
			</span>
		</header>
		<main class="wrapper">
			<section class="sec-mv">
				<div class="mv-video">
					<img src="./img/bg-01.png" alt="Jx2Reborn">
				</div>
				<div class="mv-block">
					<h1 class="mv-block__heading">
						<img src="./img/mv-heading.png" alt="Jx2Reborn">
					</h1>
					<div class="mv-block__play">
						<img src="./img/play.png" alt="play">
					</div>
					<ul class="mv-block__option">
						<li class="mv-block__option-item">
							<a href="" class="c-btn__img">
								<img src="./img/btn-01.png" alt="Alpha test info" class="img-01">
								<img src="./img/btn-01-hv.png" alt="Alpha test info" class="img-02">
							</a>
						</li>
						<li class="mv-block__option-item">
							<a href="" class="c-btn__img">
								<img src="./img/btn-02.png" alt="Register now" class="img-01">
								<img src="./img/btn-02-hv.png" alt="Register now" class="img-02">
							</a>
						</li>
					</ul>
				</div>
			</section>
			<section class="sec-regitter">
				<div class="inner">
					<h2 class="heading-block">
						<img src="./img/heading-01.png" alt="Early Registration Rewards ">
					</h2>
					<div class="regitter">
						<div class="regitter-step">
							<div class="regitter-step__item">
								<img src="./img/step-01.png" alt="step 01">
								<div class="regitter-step__block --form">
									<div class="regitter-step__form">
										<input type="text" class="form-control">
										<button class="regitter-step__form-sub c-btn__img">
											<img src="./img/btn-03.png" alt="Sign up" class="img-01">
											<img src="./img/btn-03-hv.png" alt="Sign up" class="img-02">
										</button>
									</div>
								</div>
							</div>
							<div class="regitter-step__item">
								<img src="./img/step-02.png" alt="step 02">
								<div class="regitter-step__block">
									<div class="regitter-step__app">
										<div class="regitter-step__app-links">
											<a href="" target="_blank">
												<img src="./img/app.png" alt="App store">
											</a>
											<a href="" target="_blank">
												<img src="./img/google.png" alt="Google play">
											</a>
										</div>
										<div class="regitter-step__app-show">
											<div class="regitter-step__app-show-fill">
												<img src="./img/item-01.png" alt="img">
											</div>
											<div class="regitter-step__app-show-txt"> Mount Reward <span>Ben Xiao</span>
											</div>
										</div>
									</div>
								</div>
							</div>
							<div class="regitter-step__item">
								<img src="./img/step-03.png" alt="step 03">
								<div class="regitter-step__block">
									<div class="regitter-step__facebook">
										<div class="regitter-step__facebook-heading">
											<a href="" class="c-btn__img">
												<img src="./img/btn-04.png" alt="Facebook" class="img-01">
												<img src="./img/btn-04-hv.png" alt="Facebook" class="img-02">
											</a>
											<span>Claim Starter Reward</span>
										</div>
										<ul class="regitter-step__facebook-list">
											<li class="regitter-step__facebook-list-item">
												<img src="./img/item-01.png" alt="img">
											</li>
											<li class="regitter-step__facebook-list-item">
												<img src="./img/item-01.png" alt="img">
											</li>
											<li class="regitter-step__facebook-list-item">
												<img src="./img/item-01.png" alt="img">
											</li>
											<li class="regitter-step__facebook-list-item">
												<img src="./img/item-01.png" alt="img">
											</li>
										</ul>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>
		</main>
		<footer id="footer">
			<div class="inner">
			</div>
		</footer>
		<div class="float-right">
			<div class="float-right__menu pc">
				<img src="./img/bg-menu.png" alt="bg">
				<div class="float-right__menu-option">
					<div class="float-right__menu-option-item --01">
						<img src="./img/close-menu.png" alt="img" class="img-01">
						<img src="./img/close-menu-hv.png" alt="img" class="img-02">
					</div>
					<div class="float-right__menu-option-item --02">
						<img src="./img/open-menu.png" alt="img" class="img-01">
						<img src="./img/open-menu-hv.png" alt="img" class="img-02">
					</div>
				</div>
				<div class="float-right__menu-block">
					<a href="" class="float-right__menu-logo">
						<img src="./img/menu-baner.png" alt="img">
					</a>
					<ul class="float-right__menu-nav">
						<li>
							<a href="">
								<img src="./img/menu-05.png" alt="img" class="img-01">
								<img src="./img/menu-05-hv.png" alt="img" class="img-02">
							</a>
						</li>
						<li>
							<a href="">
								<img src="./img/menu-06.png" alt="img" class="img-01">
								<img src="./img/menu-06-hv.png" alt="img" class="img-02">
							</a>
						</li>
						<li>
							<a href="">
								<img src="./img/menu-07.png" alt="img" class="img-01">
								<img src="./img/menu-07-hv.png" alt="img" class="img-02">
							</a>
						</li>
						<li>
							<a href="">
								<img src="./img/menu-08.png" alt="img" class="img-01">
								<img src="./img/menu-08-hv.png" alt="img" class="img-02">
							</a>
						</li>
					</ul>
				</div>
			</div>
			<a href="" class="float-right__top js-backtop">
				<img src="./img/backtop.png" alt="Top" class="img-01">
				<img src="./img/backtop-hv.png" alt="Top" class="img-02">
			</a>
		</div>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
		<script src="./js/slick/slick.min.js"></script>
		<script src="./js/vendors/jquery.matchHeight-min.js"></script>
		<script src="./js/setting.js"></script>
	</body>
</html>
